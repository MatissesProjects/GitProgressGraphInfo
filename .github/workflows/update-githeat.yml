name: Update GitHeat Profile Image

on:
  push:
    paths:
      - '.github/workflows/**'
  schedule:
    - cron: '15 8 * * *' # 12:15 AM PST
  workflow_dispatch:
    inputs:
      timezone:
        description: 'Timezone for analytics (e.g. America/Los_Angeles)'
        required: false
        default: 'America/Los_Angeles'
      custom_start_color:
        description: 'Start color for custom range (HEX, e.g. #4a207e)'
        required: false
        default: '#4a207e'
      custom_stop_color:
        description: 'Stop color for custom range (HEX, e.g. #04ff00)'
        required: false
        default: '#04ff00'
      animation_speed:
        description: 'Animation speed in seconds (e.g. 8)'
        required: false
        default: '8'
      animation_style:
        description: 'Animation style (hue, breathe, sparkle)'
        required: false
        default: 'hue'

jobs:
  update-profile:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Needed to push back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        working-directory: profile-updater
        run: |
          npm install
          # Install Chrome for Puppeteer
          npx puppeteer browsers install chrome
          # Puppeteer requires some system dependencies on Linux, plus ffmpeg for GIF generation
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libnss3 libatk-bridge2.0-0 libgtk-3-0 libxss1 libasound2t64 libpango-1.0-0 libpangocairo-1.0-0 ffmpeg

      - name: Run Profile Updater
        working-directory: profile-updater
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
          TIMEZONE: ${{ github.event.inputs.timezone || 'America/Los_Angeles' }}
          CUSTOM_START_COLOR: ${{ github.event.inputs.custom_start_color || '#4a207e' }}
          CUSTOM_STOP_COLOR: ${{ github.event.inputs.custom_stop_color || '#04ff00' }}
          ANIMATION_SPEED: ${{ github.event.inputs.animation_speed || '8' }}
          ANIMATION_STYLE: ${{ github.event.inputs.animation_style || 'hue' }}
        run: npm start

      - name: Check for generated animation
        run: |
          if [ -f "githeat.gif" ]; then
            echo "githeat.gif found!"
            ls -l githeat.gif
          else
            echo "githeat.gif NOT found!"
            find . -name "*.gif"
            exit 1
          fi

      - name: Commit and Push Animation
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add githeat.gif
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update GitHeat Profile Analytics Animation" && git push)
