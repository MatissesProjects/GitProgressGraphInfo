name: Update GitHeat Profile Image

on:
  push:
    paths:
      - '.github/workflows/**'
  schedule:
    - cron: '15 0 * * *' # 12:15 AM UTC
  workflow_dispatch:
    inputs:
      timezone:
        description: 'Timezone for analytics (e.g. America/Los_Angeles)'
        required: false
        default: 'America/Los_Angeles' # Allow manual trigger
    inputs:
      timezone:
        description: 'Timezone for analytics (e.g. America/Los_Angeles)'
        required: false
        default: 'America/Los_Angeles'

jobs:
  update-profile:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Needed to push back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        working-directory: profile-updater
        run: |
          npm install
          # Install Chrome for Puppeteer
          npx puppeteer browsers install chrome
          # Puppeteer requires some system dependencies on Linux
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libnss3 libatk-bridge2.0-0 libgtk-3-0 libxss1 libasound2t64 libpango-1.0-0 libpangocairo-1.0-0

      - name: Run Profile Updater
        working-directory: profile-updater
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
          TIMEZONE: ${{ github.event.inputs.timezone || 'America/Los_Angeles' }}
        run: npm start

      - name: Check for generated image
        run: |
          if [ -f "githeat.png" ]; then
            echo "githeat.png found!"
            ls -l githeat.png
          else
            echo "githeat.png NOT found!"
            find . -name "*.png"
            exit 1
          fi

      - name: Commit and Push Image
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add githeat.png
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update GitHeat Profile Analytics Image" && git push)
